<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Table Lobby</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Экран входа / создания персонажа -->
        <div id="join-screen" class="screen active">
            <h1 class="glow-text">RPG TABLE</h1>
            <p class="subtitle">Подключение к столу</p>

            <form id="join-form">
                <div class="input-group">
                    <label for="player-name">Имя персонажа</label>
                    <input type="text" id="player-name" placeholder="Например: Гэндальф" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="player-desc">Описание (кратко)</label>
                    <textarea id="player-desc" placeholder="Мудрый маг с длинной бородой..."></textarea>
                </div>

                <div class="input-group">
                    <label for="player-photo">Ваше фото (аватар)</label>
                    <input type="file" id="player-photo" accept="image/*" required>
                    <div id="photo-preview-container" class="photo-preview-container" style="display:none;">
                        <img id="photo-preview-img" class="photo-preview-img">
                    </div>
                </div>

                <div class="input-group">
                    <label>Выберите фишку персонажа</label>
                    <div class="token-carousel-container">
                        <button type="button" class="carousel-btn left" id="carousel-left">◀</button>
                        <div class="token-carousel" id="token-carousel">
                            <div class="loader"></div>
                        </div>
                        <button type="button" class="carousel-btn right" id="carousel-right">▶</button>
                    </div>
                    <input type="hidden" id="selected-token-id" required>
                </div>

                <button type="submit" class="btn btn-primary" id="join-btn" disabled>Загрузка фишек...</button>
            </form>
        </div>

        <!-- Экран ожидания (после входа) -->
        <div id="waiting-screen" class="screen">
            <div class="waiting-card">
                <div class="photo-preview small" id="waiting-photo"></div>
                <h2 id="waiting-name">Имя</h2>
                <div class="loader"></div>
                <p>Ждем начала игры...</p>
                <p class="hint">Посмотрите на экран Мастера!</p>
            </div>
        </div>

        <!-- Экран игры -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="photo-preview tiny" id="game-photo"></div>
                <h2 id="game-name">Имя</h2>
            </div>
            
            <div class="dpad-container">
                <button class="dpad-btn up-left" id="btn-up-left">↖</button>
                <button class="dpad-btn up" id="btn-up">▲</button>
                <button class="dpad-btn up-right" id="btn-up-right">↗</button>
                
                <button class="dpad-btn left" id="btn-left">◀</button>
                <div class="dpad-center"></div>
                <button class="dpad-btn right" id="btn-right">▶</button>
                
                <button class="dpad-btn down-left" id="btn-down-left">↙</button>
                <button class="dpad-btn down" id="btn-down">▼</button>
                <button class="dpad-btn down-right" id="btn-down-right">↘</button>
            </div>

            <button class="btn btn-primary abilities-btn" id="btn-abilities">✨ Мои Способности</button>
        </div>

        <!-- Модальное окно способностей -->
        <div id="abilities-modal" class="modal">
            <div class="modal-content">
                <h3>Способности и Инвентарь</h3>
                <div class="modal-body">
                    <p><strong>Описание:</strong> <span id="modal-desc"></span></p>
                    <hr>
                    <p class="hint">Здесь будут отображаться ваши игровые характеристики и инвентарь.</p>
                </div>
                <button class="btn btn-secondary" id="btn-close-modal">Закрыть</button>
            </div>
        </div>
        
        <!-- Transition Modal -->
        <div id="transition-modal" class="modal">
            <div class="modal-content transition-content">
                <h2 id="transition-text">Вы хотите перейти?</h2>
                <div class="transition-buttons">
                    <button class="btn btn-primary" id="btn-transition-confirm">✅ Перейти</button>
                    <button class="btn btn-secondary" id="btn-transition-cancel">❌ Отмена</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
